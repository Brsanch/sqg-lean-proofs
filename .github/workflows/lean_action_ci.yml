name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read # Read access to repository contents
  pages: write # Write access to GitHub Pages
  id-token: write # Write access to ID tokens

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
      # docgen is known to hang on this repo; give it a short timeout and
      # mark it non-blocking so the job finishes and dedupe-caches runs.
      - uses: leanprover-community/docgen-action@v1
        continue-on-error: true
        timeout-minutes: 10

  # Dedupe caches after the build finishes. `leanprover/lean-action@v1`
  # saves a new cache entry on every run even when an identical-key
  # entry already exists, so duplicates accumulate against the 10 GB
  # per-repo Actions cache quota. This job keeps only the newest entry
  # per key; older duplicates are pruned.
  dedupe-caches:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    permissions:
      actions: write
    steps:
      - name: Remove duplicate caches (keep newest per key)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Group caches by key, keep the newest by created_at, delete the rest.
          ids=$(gh api "/repos/$REPO/actions/caches?per_page=100" \
            --jq '.actions_caches | group_by(.key) | map(sort_by(.created_at) | .[:-1]) | flatten | .[].id')
          if [ -z "$ids" ]; then
            echo "No duplicate caches to delete."
            exit 0
          fi
          echo "$ids" | while read id; do
            echo "Deleting duplicate cache id=$id"
            gh api -X DELETE "/repos/$REPO/actions/caches/$id" || true
          done
