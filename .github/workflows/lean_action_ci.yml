name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read # Read access to repository contents
  pages: write # Write access to GitHub Pages
  id-token: write # Write access to ID tokens

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
      # docgen is known to hang on this repo; give it a short timeout and
      # mark it non-blocking so the job finishes and dedupe-caches runs.
      - uses: leanprover-community/docgen-action@v1
        continue-on-error: true
        timeout-minutes: 10

  # Prune caches after the build finishes. `leanprover/lean-action@v1`
  # keys caches by commit SHA, so every push creates a unique key and
  # the per-key dedupe is a no-op. Instead, keep only the newest cache
  # (by created_at) regardless of key, and delete the rest. This keeps
  # the repo under the 10 GB per-repo Actions cache quota.
  dedupe-caches:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    permissions:
      actions: write
    steps:
      - name: Prune caches (keep newest, drop rest)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Sort by created_at descending, drop first (newest), delete rest.
          ids=$(gh api "/repos/$REPO/actions/caches?per_page=100" \
            --jq '.actions_caches | sort_by(.created_at) | reverse | .[1:] | .[].id')
          if [ -z "$ids" ]; then
            echo "No caches to prune (≤1 present)."
            exit 0
          fi
          echo "$ids" | while read id; do
            echo "Deleting cache id=$id"
            gh api -X DELETE "/repos/$REPO/actions/caches/$id" || true
          done
